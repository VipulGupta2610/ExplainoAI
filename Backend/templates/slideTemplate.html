<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explaino AI Premium Slide</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 1280px;
      height: 720px;
      background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .container {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 60px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 42px;
      font-weight: bold;
      color: #60a5fa;
    }

    .badge {
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(96,165,250,0.15);
      color: #93c5fd;
      font-size: 18px;
    }

    .content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 38px;
      line-height: 1.6;
      color: #f8fafc;
      padding: 0 40px;
      font-weight: 500;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 20px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="top">
      <div class="logo">Explaino AI</div>
      <div class="badge">Premium AI Video</div>
    </div>

    <div class="content">
      {{CONTENT}}
    </div>

    <div class="footer">
      <div>Powered by AI</div>
      <div>www.explainoai.com</div>
    </div>

  </div>

</body>
</html>
